<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kira Pet Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gradient-to-b from-green-50 to-orange-50">

    <div class="max-w-3xl mx-auto p-4">

      <h1 class="text-3xl font-bold text-center mb-4">🐾 Kira Pet Shop</h1>
      <p class="text-center mb-6">Pedidos por WhatsApp</p>

      <div class="bg-white p-4 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-2">Productos</h2>

        <select id="producto" class="w-full border p-2 rounded mb-2">
          <option value="Nupec Adulto 2kg - $18.99">Nupec Adulto 2kg - $18.99</option>
          <option value="Diamond Naturals 2kg - $13.99">Diamond Naturals 2kg - $13.99</option>
          <option value="Arena Van Cat 5kg - $5.99">Arena Van Cat 5kg - $5.99</option>
        </select>

        <input id="nombre" placeholder="Tu nombre" class="w-full border p-2 rounded mb-2"/>
        <input id="direccion" placeholder="Dirección" class="w-full border p-2 rounded mb-2"/>

        <button onclick="enviarPedido()" class="bg-green-600 text-white w-full p-3 rounded-xl">
          Enviar pedido por WhatsApp
        </button>
      </div>

    </div>

    <script>
      function enviarPedido() {
        const producto = document.getElementById('producto').value;
        const nombre = document.getElementById('nombre').value;
        const direccion = document.getElementById('direccion').value;

        const mensaje = `Hola, quiero pedir:\n${producto}\n\nNombre: ${nombre}\nDirección: ${direccion}`;
        const url = `https://wa.me/50379000427?text=${encodeURIComponent(mensaje)}`;

        window.open(url, '_blank');
      }
    </script>

  </body>
</html>
