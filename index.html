<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kira Pet Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-gradient-to-b from-green-50 via-white to-orange-50"><div class="max-w-4xl mx-auto p-4">  <!-- HEADER -->  <div class="text-center mb-6">
    <h1 class="text-4xl font-bold">🐾 Kira Pet Shop</h1>
    <p class="text-gray-600">Envíos a domicilio • Pago contra entrega</p>
  </div>  <!-- DESTACADOS -->  <div class="grid grid-cols-2 gap-3 mb-6">
    <div class="bg-green-100 p-3 rounded-xl text-center">
      🔥 Nupec más vendido
    </div>
    <div class="bg-orange-100 p-3 rounded-xl text-center">
      🐱 Arena en oferta
    </div>
  </div>  <!-- PRODUCTO -->  <div class="bg-white p-5 rounded-2xl shadow-lg"><h2 class="text-xl font-bold mb-3">Selecciona producto</h2>

<select id="producto" class="w-full border p-3 rounded-xl mb-3">
  <option value="Nupec Adulto 2kg - $18.99">Nupec Adulto 2kg - $18.99</option>
  <option value="Nupec Adulto 8kg - $66.99">Nupec Adulto 8kg - $66.99</option>
  <option value="Diamond Naturals 2kg - $13.99">Diamond Naturals 2kg - $13.99</option>
  <option value="Diamond Naturals 15kg - $77.99">Diamond Naturals 15kg - $77.99</option>
  <option value="Arena Van Cat 5kg - $5.99">Arena Van Cat 5kg - $5.99</option>
  <option value="Arena Van Cat 10kg - $10.99">Arena Van Cat 10kg - $10.99</option>
</select>

<input id="nombre" placeholder="Tu nombre" class="w-full border p-3 rounded-xl mb-2" />
<input id="telefono" placeholder="Teléfono" class="w-full border p-3 rounded-xl mb-2" />
<input id="direccion" placeholder="Dirección" class="w-full border p-3 rounded-xl mb-3" />

<button onclick="enviarPedido()" class="bg-green-600 text-white w-full p-4 rounded-xl text-lg font-bold">
  📲 Pedir por WhatsApp
</button>

  </div></div><script>
function enviarPedido() {
  const producto = document.getElementById('producto').value;
  const nombre = document.getElementById('nombre').value;
  const telefono = document.getElementById('telefono').value;
  const direccion = document.getElementById('direccion').value;

  const mensaje = `🐾 Pedido Kira Pet Shop\n\nProducto:\n${producto}\n\nCliente:\nNombre: ${nombre}\nTel: ${telefono}\nDirección: ${direccion}`;

  const url = `https://wa.me/50379000427?text=${encodeURIComponent(mensaje)}`;

  window.open(url, '_blank');
}
</script></body>
</html>
