<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kira Pet Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-green-50 via-white to-orange-50"><div class="max-w-5xl mx-auto p-4">  <h1 class="text-4xl font-bold text-center mb-2">🐾 Kira Pet Shop</h1>
  <p class="text-center text-gray-600 mb-6">Envíos a domicilio • Pago contra entrega</p>  <!-- SELECT PRODUCT -->  <div class="bg-white p-5 rounded-2xl shadow mb-6">
    <h2 class="font-bold text-xl mb-3">Agregar producto</h2><select id="producto" class="w-full border p-3 rounded-xl mb-3">
  <option value="Nupec Adulto 2kg|18.99">Nupec Adulto 2kg - $18.99</option>
  <option value="Nupec Adulto 8kg|66.99">Nupec Adulto 8kg - $66.99</option>
  <option value="Diamond Naturals Adult 2kg|13.99">Diamond Naturals 2kg - $13.99</option>
  <option value="Diamond Naturals Adult 15kg|77.99">Diamond Naturals 15kg - $77.99</option>

  <option value="TOW Smoked Salmon 2kg|21.99">TOW Smoked Salmon 2kg - $21.99</option>
  <option value="TOW Smoked Salmon 5.6kg|55.99">TOW Smoked Salmon 5.6kg - $55.99</option>
  <option value="TOW Smoked Salmon 12.2kg|89.99">TOW Smoked Salmon 12.2kg - $89.99</option>

  <option value="TOW Bison Venison 2kg|21.99">TOW Bison Venison 2kg - $21.99</option>
  <option value="TOW Bison Venison 5.6kg|55.99">TOW Bison Venison 5.6kg - $55.99</option>
  <option value="TOW Bison Venison 12.2kg|89.99">TOW Bison Venison 12.2kg - $89.99</option>

  <option value="Arena Van Cat 5kg|5.99">Arena Van Cat 5kg - $5.99</option>
  <option value="Arena Van Cat 10kg|10.99">Arena Van Cat 10kg - $10.99</option>
</select>

<button onclick="agregar()" class="bg-green-600 text-white w-full p-3 rounded-xl font-bold">➕ Agregar al carrito</button>

  </div>  <!-- CART -->  <div class="bg-white p-5 rounded-2xl shadow mb-6">
    <h2 class="font-bold text-xl mb-3">🛒 Carrito</h2>
    <div id="carrito"></div>
    <p class="mt-3 font-bold text-lg">Total: $<span id="total">0.00</span></p>
  </div>  <!-- CLIENT -->  <div class="bg-white p-5 rounded-2xl shadow">
    <h2 class="font-bold text-xl mb-3">Datos del cliente</h2>
    <input id="nombre" placeholder="Nombre" class="w-full border p-3 rounded-xl mb-2" />
    <input id="telefono" placeholder="Teléfono" class="w-full border p-3 rounded-xl mb-2" />
    <input id="direccion" placeholder="Dirección" class="w-full border p-3 rounded-xl mb-3" /><button onclick="enviarPedido()" class="bg-green-700 text-white w-full p-4 rounded-xl text-lg font-bold">📲 Enviar pedido por WhatsApp</button>

  </div></div><script>
let carrito = [];

function agregar(){
  const select = document.getElementById('producto').value.split('|');
  const nombre = select[0];
  const precio = parseFloat(select[1]);

  carrito.push({nombre, precio});
  render();
}

function render(){
  const div = document.getElementById('carrito');
  div.innerHTML = '';
  let total = 0;

  carrito.forEach((item, i)=>{
    total += item.precio;
    div.innerHTML += `<div class='flex justify-between border-b py-2'>${item.nombre} <button onclick='eliminar(${i})'>❌</button></div>`;
  });

  document.getElementById('total').innerText = total.toFixed(2);
}

function eliminar(i){
  carrito.splice(i,1);
  render();
}

function enviarPedido(){
  if(carrito.length === 0){alert('Agrega productos'); return;}

  let mensaje = '🐾 Pedido Kira Pet Shop\n\nProductos:\n';
  let total = 0;

  carrito.forEach(item=>{
    mensaje += `- ${item.nombre} ($${item.precio})\n`;
    total += item.precio;
  });

  mensaje += `\nTotal: $${total.toFixed(2)}\n\n`;
  mensaje += `Nombre: ${document.getElementById('nombre').value}\n`;
  mensaje += `Tel: ${document.getElementById('telefono').value}\n`;
  mensaje += `Dirección: ${document.getElementById('direccion').value}`;

  const url = `https://wa.me/50379000427?text=${encodeURIComponent(mensaje)}`;
  window.open(url, '_blank');
}
</script></body>
</html>
