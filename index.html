<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kira Pet Shop</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-bold text-center mb-2">🐾 Kira Pet Shop</h1>
<p class="text-center text-gray-600 mb-6">Envíos a domicilio • Pago contra entrega</p>

<div id="productos"></div>

<!-- CARRITO -->
<div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg p-4 border-t">
  <div class="flex justify-between items-center">
    <p class="font-bold">🛒 Total: $<span id="total">0.00</span></p>
    <button onclick="enviarPedido()" class="bg-green-600 text-white px-4 py-2 rounded-xl">
      WhatsApp
    </button>
  </div>
</div>

</div>

<script>

const data = [

{
titulo: "Taste Of The Wild",
productos: [
{name:"Salmon 2kg", precio:21.99},
{name:"Salmon 5.6kg", precio:55.99},
{name:"Salmon 12.2kg", precio:89.99},
{name:"Bison 2kg", precio:21.99},
{name:"Bison 5.6kg", precio:55.99},
{name:"Bison 12.2kg", precio:89.99}
]
},

{
titulo: "Nupec",
productos: [
{name:"Cachorro Pequeño 2kg", precio:20.99},
{name:"Cachorro Grande 20kg", precio:144.99},
{name:"Adulto Pequeño 2kg", precio:18.99},
{name:"Adulto Grande 20kg", precio:119.99},
{name:"Senior 2kg", precio:25.99},
{name:"Sensitive 2kg", precio:24.99}
]
},

{
titulo: "Diamond Naturals",
productos: [
{name:"Adult Lamb 2kg", precio:13.99},
{name:"Adult Lamb 15kg", precio:77.99},
{name:"Puppy 2kg", precio:14.99},
{name:"Kitten 1kg", precio:8.49}
]
},

{
titulo: "Óptimo",
productos: [
{name:"Óptimo 2kg", precio:6.99}
]
},

{
titulo: "Nucan",
productos: [
{name:"Nucan 2kg", precio:7.99}
]
},

{
titulo: "Snacks & Latas",
productos: [
{name:"Nupec Treats", precio:6.99},
{name:"Taste Of The Wild Lata", precio:4.99}
]
}

];

let carrito = [];

function render(){
let html = "";

data.forEach(cat=>{
html += `<h2 class="text-xl font-bold mt-6 mb-3">${cat.titulo}</h2>`;
html += `<div class="grid grid-cols-2 gap-3">`;

cat.productos.forEach(p=>{
html += `
<div class="bg-white rounded-xl p-3 shadow">
<img src="https://via.placeholder.com/150" class="rounded mb-2">
<p class="font-semibold">${p.name}</p>
<p class="text-green-600 font-bold">$${p.precio}</p>
<button onclick='add("${p.name}",${p.precio})' class="mt-2 w-full bg-green-500 text-white rounded py-1">
Agregar
</button>
</div>
`;
});

html += `</div>`;
});

document.getElementById("productos").innerHTML = html;
}

function add(nombre, precio){
carrito.push({nombre, precio});
actualizarTotal();
}

function actualizarTotal(){
let total = 0;
carrito.forEach(p=> total += p.precio);
document.getElementById("total").innerText = total.toFixed(2);
}

function enviarPedido(){
if(carrito.length===0){alert("Agrega productos"); return;}

let msg = "🐾 Pedido Kira Pet Shop\n\n";
let total = 0;

carrito.forEach(p=>{
msg += `- ${p.nombre} ($${p.precio})\n`;
total += p.precio;
});

msg += `\nTotal: $${total.toFixed(2)}`;

window.open(`https://wa.me/50379000427?text=${encodeURIComponent(msg)}`);
}

render();

</script>

</body>
</html>
